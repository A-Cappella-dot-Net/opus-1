name: GitHub Clone Count Update Everyday

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v2
        with:
          persist-credentials: false

      - name: gh login
        run: echo "${{ secrets.SECRET_TOKEN }}" | gh auth login --with-token

      - name: parse latest traffic counts
        run: |
          curl --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/traffic/clones \
            > clone.json
          curl --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/traffic/views \
            > views.json

      - name: create gist and download previous counts
        id: set_id
        run: |
          if gh secret list | grep -q "GIST_ID"
          then
              echo "GIST_ID found"
              echo "GIST=${{ secrets.GIST_ID }}" >> $GITHUB_OUTPUT
              curl https://gist.githubusercontent.com/${{ github.actor }}/${{ secrets.GIST_ID }}/raw/clone.json > clone_before.json
              if cat clone_before.json | grep '404: Not Found'; then
                echo "GIST_ID not valid anymore. Creating another gist..."
                gist_id=$(gh gist create clone.json | awk -F / '{print $NF}')
                echo $gist_id | gh secret set GIST_ID
                echo "GIST=$gist_id" >> $GITHUB_OUTPUT
                cp clone.json clone_before.json
                cp views.json views_before.json
                git rm --ignore-unmatch  CLONE.md
              else
                # A valid gist may predate views tracking; fall back to a fresh start.
                curl https://gist.githubusercontent.com/${{ github.actor }}/${{ secrets.GIST_ID }}/raw/views.json > views_before.json
                if cat views_before.json | grep '404: Not Found'; then
                  cp views.json views_before.json
                fi
              fi
          else
              echo "GIST_ID not found. Creating a gist..."
              gist_id=$(gh gist create clone.json | awk -F / '{print $NF}')
              echo $gist_id | gh secret set GIST_ID
              echo "GIST=$gist_id" >> $GITHUB_OUTPUT
              cp clone.json clone_before.json
              cp views.json views_before.json
          fi

      - name: accumulate clone and view counts
        run: |
          python3 - <<'PY'
          import json


          def accumulate(now_file, before_file, key):
              with open(now_file) as fh:
                  now = json.load(fh)
              with open(before_file) as fh:
                  before = json.load(fh)

              timestamps = {before[key][i]['timestamp']: i
                            for i in range(len(before[key]))}

              latest = dict(before)
              for entry in now[key]:
                  ts = entry['timestamp']
                  if ts in timestamps:
                      latest[key][timestamps[ts]] = entry
                  else:
                      latest[key].append(entry)

              latest['count'] = sum(int(x['count']) for x in latest[key])
              latest['uniques'] = sum(int(x['uniques']) for x in latest[key])

              # Collapse the oldest daily entries into monthly buckets so the
              # stored history cannot grow without bound.
              if len(timestamps) > 100:
                  remove_this = []
                  entries = latest[key]
                  for i in range(len(timestamps) - 35):
                      entries[i]['timestamp'] = entries[i]['timestamp'][:7]
                      if entries[i]['timestamp'] == entries[i + 1]['timestamp'][:7]:
                          entries[i + 1]['count'] += entries[i]['count']
                          entries[i + 1]['uniques'] += entries[i]['uniques']
                          remove_this.append(entries[i])
                  for item in remove_this:
                      entries.remove(item)

              with open(now_file, 'w', encoding='utf-8') as fh:
                  json.dump(latest, fh, ensure_ascii=False, indent=4)


          accumulate('clone.json', 'clone_before.json', 'clones')
          accumulate('views.json', 'views_before.json', 'views')
          PY

      - name: Update gist with latest counts
        run: |
          python3 - <<'PY'
          import json

          files = {}
          for name in ('clone.json', 'views.json'):
              with open(name) as fh:
                  files[name] = {"content": fh.read()}

          payload = {
              "description": "${{ github.repository }} traffic statistics",
              "files": files,
          }
          with open('post_gist.json', 'w', encoding='utf-8') as fh:
              json.dump(payload, fh)
          PY
          curl -s -X PATCH \
            --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @post_gist.json https://api.github.com/gists/${{ steps.set_id.outputs.GIST }} > /dev/null 2>&1

          if [ ! -f CLONE.md ]; then
            shields="https://img.shields.io/badge/dynamic/json?color=success&query=uniques&url="
            clone_url="https://gist.githubusercontent.com/${{ github.actor }}/${{ steps.set_id.outputs.GIST }}/raw/clone.json"
            views_url="https://gist.githubusercontent.com/${{ github.actor }}/${{ steps.set_id.outputs.GIST }}/raw/views.json"
            repo="https://github.com/${{ github.repository }}"
            echo ''> CLONE.md
            echo '
            **Markdown**

            ```markdown' >> CLONE.md
            echo "[![GitHub Clones]($shields$clone_url&label=Clones&logo=github)]($repo)" >> CLONE.md
            echo "[![GitHub Views]($shields$views_url&label=Views&logo=github)]($repo)" >> CLONE.md
            echo '
            ```

            **HTML**
            ```html' >> CLONE.md
            echo "<a href='$repo'><img alt='GitHub Clones' src='$shields$clone_url&label=Clones&logo=github'></a>" >> CLONE.md
            echo "<a href='$repo'><img alt='GitHub Views' src='$shields$views_url&label=Views&logo=github'></a>" >> CLONE.md
            echo '```' >> CLONE.md

            git add CLONE.md
            git config --global user.name "GitHub Action"
            git config --global user.email "action@github.com"
            git commit -m "create clone and view count badges"
          fi

      - name: Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git remote set-url origin https://${{ github.actor }}:${{ secrets.SECRET_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin master
          git rebase origin/master
          git push origin HEAD:master
